name: Keep Streamlit App Awake

on:
  schedule:
    # Every 6 hours — frequent enough to prevent sleep (7-day inactivity limit)
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Visit Streamlit app with headless browser
        run: |
          python - <<'EOF'
          import asyncio
          from playwright.async_api import async_playwright, TimeoutError as PWTimeout

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page()
                  print("Navigating to app...")
                  await page.goto("https://canopy-configurator.streamlit.app/", timeout=60000)

                  # If app is sleeping, Streamlit shows a wake-up prompt — click it
                  try:
                      wake_btn = await page.wait_for_selector(
                          "text=Yes, get this app back up!", timeout=8000
                      )
                      print("App was sleeping — clicking wake button...")
                      await wake_btn.click()
                  except PWTimeout:
                      print("No wake button found — app may already be running.")

                  # Wait up to 3 minutes for the app to fully boot
                  print("Waiting for app to load...")
                  await page.wait_for_selector(
                      "[data-testid='stAppViewContainer']", timeout=180000
                  )
                  print("App loaded and WebSocket connected successfully.")
                  await asyncio.sleep(5)
                  await browser.close()

          asyncio.run(main())
          EOF
