name: Keep Streamlit App Awake

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          echo "Pinging Streamlit app..."
          STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" https://canopy-configurator.streamlit.app/)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "App responded successfully (status $STATUS) - keep-alive ping sent"
            exit 0
          else
            echo "App returned status $STATUS - failed"
            exit 1
          fi
