name: Keep Streamlit App Awake

on:
  schedule:
    # Every 6 hours — well within the 7-day inactivity sleep threshold
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Visit Streamlit app with headless browser
        run: |
          python - <<'EOF'
          import asyncio
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page()

                  print("Navigating to app...")
                  # Just wait for the HTML to load — Streamlit's JS will then
                  # open a WebSocket automatically, which counts as viewer activity.
                  await page.goto(
                      "https://canopy-configurator.streamlit.app/",
                      wait_until="domcontentloaded",
                      timeout=60000,
                  )

                  # Hold the connection open for 30s so Streamlit registers the visit
                  print("Holding WebSocket connection open for 30s...")
                  await asyncio.sleep(30)

                  title = await page.title()
                  print(f"Done. Page title: '{title}'")
                  await browser.close()

          asyncio.run(main())
          EOF
