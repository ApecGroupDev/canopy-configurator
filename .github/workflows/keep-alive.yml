name: Keep Streamlit App Awake

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        continue-on-error: true
        run: |
          echo "Pinging Streamlit app..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" https://canopy-configurator.streamlit.app/ || true
          echo "Ping sent successfully"
